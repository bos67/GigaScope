<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GigaScope — Мониторинг банковской инфраструктуры</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Roboto',sans-serif;background:#0a0e1a;overflow:hidden;height:100vh;color:#e0e6f0}
#header{position:fixed;top:0;left:0;right:0;height:56px;z-index:100;background:linear-gradient(135deg,rgba(10,14,26,0.97),rgba(20,30,60,0.97));border-bottom:1px solid rgba(0,180,255,0.2);display:flex;align-items:center;padding:0 20px;gap:12px;backdrop-filter:blur(12px)}
#header .logo{font-size:18px;font-weight:700;letter-spacing:1px;white-space:nowrap}
#header .logo span{color:#00b4ff}
.header-badge{font-size:9px;padding:1px 8px;border-radius:6px;letter-spacing:1px;font-weight:600;background:linear-gradient(135deg,rgba(0,180,255,0.2),rgba(156,39,176,0.2));border:1px solid rgba(0,180,255,0.3);color:#81d4fa}
#header .status-bar{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:11px;flex-wrap:wrap;justify-content:flex-end}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px}
.dot-green{background:#00e676;box-shadow:0 0 8px #00e67666}
.dot-yellow{background:#ffd600;box-shadow:0 0 8px #ffd60066}
.dot-red{background:#ff1744;box-shadow:0 0 8px #ff174466}
#graph-container{position:fixed;top:56px;left:0;right:0;bottom:0}
#graph-container canvas{display:block}
#legend{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(10,14,26,0.9);border:1px solid rgba(0,180,255,0.15);border-radius:10px;padding:8px 14px;display:flex;gap:12px;backdrop-filter:blur(8px);font-size:11px;z-index:80;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:9px;height:9px;border-radius:50%}
.legend-sep{display:inline-block;width:1px;height:14px;background:rgba(255,255,255,0.08)}
#tooltip{position:fixed;pointer-events:none;z-index:95;background:rgba(10,14,26,0.92);border:1px solid rgba(0,180,255,0.2);border-radius:8px;padding:8px 12px;font-size:11px;line-height:1.5;color:#b0bec5;max-width:280px;display:none;backdrop-filter:blur(8px);box-shadow:0 4px 20px rgba(0,0,0,0.5)}
#tooltip .tt-name{font-size:13px;font-weight:700;color:#e0e6f0;margin-bottom:2px}
#tooltip .tt-row{display:flex;justify-content:space-between;gap:8px}
#tooltip .tt-label{color:#78909c}
#tooltip .tt-val{font-weight:600}
#tooltip .tt-val.ok{color:#00e676}
#tooltip .tt-val.warn{color:#ffd600}
#tooltip .tt-val.crit{color:#ff1744}
#tooltip .tt-divider{border-top:1px solid rgba(255,255,255,0.06);margin:4px 0}
#minimap{position:fixed;bottom:70px;right:14px;width:140px;height:105px;background:rgba(10,14,26,0.85);border:1px solid rgba(0,180,255,0.12);border-radius:6px;z-index:85;overflow:hidden;backdrop-filter:blur(4px)}
#minimap canvas{width:100%;height:100%}
#sidebar{position:fixed;top:56px;right:0;width:380px;bottom:0;background:rgba(12,18,34,0.96);border-left:1px solid rgba(0,180,255,0.15);backdrop-filter:blur(12px);z-index:90;transform:translateX(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column}
#sidebar.open{transform:translateX(0)}
#sidebar .panel-header{padding:16px 20px 10px;border-bottom:1px solid rgba(255,255,255,0.06);position:relative}
#sidebar .panel-header h2{font-size:14px;font-weight:600;color:#90caf9;letter-spacing:0.5px;padding-right:24px}
#sidebar .panel-header .close-btn{position:absolute;top:14px;right:16px;background:none;border:none;color:#78909c;font-size:20px;cursor:pointer;line-height:1}
#sidebar .panel-header .close-btn:hover{color:#fff}
#sidebar .panel-header .subtitle{font-size:11px;color:#546e7a;margin-top:3px}
#sidebar .panel-body{flex:1;overflow-y:auto;padding:12px 20px 20px}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.metric-row:last-child{border-bottom:none}
.metric-label{font-size:12px;color:#90a4ae}
.metric-value{font-size:13px;font-weight:600}
.metric-value.ok{color:#00e676}.metric-value.warn{color:#ffd600}.metric-value.crit{color:#ff1744}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600}
.badge.ok{background:rgba(0,230,118,0.15);color:#00e676}
.badge.warn{background:rgba(255,214,0,0.15);color:#ffd600}
.badge.crit{background:rgba(255,23,68,0.15);color:#ff1744}
.badge.info{background:rgba(0,180,255,0.15);color:#00b4ff}
@media(max-width:768px){#sidebar{width:100%}#header .status-bar{gap:8px;font-size:10px}#legend{font-size:9px;gap:8px;padding:6px 10px}}
#ticker{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);background:rgba(10,14,26,0.88);border:1px solid rgba(0,180,255,0.12);border-radius:10px;padding:6px 12px;display:flex;align-items:center;gap:8px;backdrop-filter:blur(8px);font-size:10px;z-index:85;width:auto;max-width:90%;height:28px;overflow:hidden}
#ticker-label{color:#546e7a;font-weight:600;letter-spacing:0.5px;white-space:nowrap;font-size:8px}
#ticker-items{display:flex;gap:0;overflow:hidden;white-space:nowrap;flex:1;min-width:0}
.ticker-item{display:inline-flex;align-items:center;gap:4px;padding:0 8px;border-right:1px solid rgba(255,255,255,0.06);animation:tickerSlide 0.4s ease-out;font-size:10px;white-space:nowrap}
.ticker-item:last-child{border-right:none}
.ticker-dot{width:5px;height:5px;border-radius:50%;display:inline-block}
.ticker-dot.critical{background:#ff1744;box-shadow:0 0 6px #ff174466}
.ticker-dot.warning{background:#ffd600;box-shadow:0 0 6px #ffd60066}
.ticker-dot.info{background:#00b4ff;box-shadow:0 0 6px #00b4ff66}
.ticker-dot.ok{background:#00e676;box-shadow:0 0 6px #00e67666}
.ticker-time{color:#546e7a;font-size:8px}
@keyframes tickerSlide{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}

#hypothesis-panel{position:fixed;right:14px;top:70px;width:260px;background:rgba(10,14,26,0.9);border:1px solid rgba(0,180,255,0.12);border-radius:10px;backdrop-filter:blur(8px);z-index:80;overflow:hidden;transition:transform 0.3s ease,opacity 0.3s ease}
#hypothesis-panel .hp-header{padding:8px 12px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between}
#hp-body{padding:4px 0;max-height:220px;overflow-y:auto}
.hp-card{padding:6px 12px;border-bottom:1px solid rgba(255,255,255,0.03);cursor:pointer;transition:background 0.2s}
.hp-card:hover{background:rgba(0,180,255,0.06)}
.hp-card:last-child{border-bottom:none}
.hp-card .hp-title{font-size:11px;font-weight:600;color:#e0e6f0;margin-bottom:2px;line-height:1.3}
.hp-card .hp-row{display:flex;justify-content:space-between;align-items:center;font-size:9px}
.hp-card .hp-label{color:#546e7a}
.hp-card .hp-confidence{font-weight:700;font-size:10px}
.hp-conf-high{color:#00e676}
.hp-conf-mid{color:#ffd600}
.hp-conf-low{color:#ff9100}
.hp-card .hp-status{font-size:8px;padding:1px 5px;border-radius:4px}
.hp-status.confirmed{background:rgba(0,230,118,0.15);color:#00e676}
.hp-status.pending{background:rgba(255,214,0,0.15);color:#ffd600}
.hp-status.rejected{background:rgba(255,23,68,0.15);color:#ff1744}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,180,255,0.25);border-radius:2px}
</style>
</head>
<body>
<div id="header">
  <div class="logo">Giga<span>Scope</span></div>
  <span class="header-badge">MVP</span>
  <div class="status-bar">
    <span><span class="status-dot dot-green"></span> Норма: <strong id="normal-count">0</strong></span>
    <span><span class="status-dot dot-yellow"></span> Внимание: <strong id="warn-count">0</strong></span>
    <span><span class="status-dot dot-red"></span> Критично: <strong id="crit-count">0</strong></span>
    <span style="color:#546e7a;">Сервисов: <strong id="total-count">0</strong></span>
  </div>
</div>
<div id="graph-container"></div>
<div id="sidebar">
  <div class="panel-header">
    <button class="close-btn" onclick="closePanel()">&times;</button>
    <h2 id="panel-title">Детали</h2>
    <div class="subtitle" id="panel-subtitle"></div>
  </div>
  <div class="panel-body" id="panel-body">
    <div style="text-align:center;color:#546e7a;padding:40px 0;font-size:13px;">Нажмите на узел графа,<br>чтобы увидеть детальную информацию</div>
  </div>
</div>
<div id="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#00e676;box-shadow:0 0 6px #00e67666"></span> Норма</div>
  <div class="legend-item"><span class="legend-dot" style="background:#ffd600;box-shadow:0 0 6px #ffd60066"></span> Внимание</div>
  <div class="legend-item"><span class="legend-dot" style="background:#ff1744;box-shadow:0 0 6px #ff174466"></span> Критично</div>
  <div class="legend-sep"></div>
  <div class="legend-item"><span class="legend-dot" style="background:#4dd0e1;box-shadow:0 0 6px #4dd0e166"></span> Sync (REST/gRPC)</div>
  <div class="legend-item"><span class="legend-dot" style="background:#ffd740;box-shadow:0 0 6px #ffd74066"></span> Async (Kafka)</div>
</div>
<div id="minimap"><canvas id="minimap-canvas"></canvas></div>
<div id="tooltip"></div>

<!-- Event Ticker -->
<div id="ticker">
  <div id="ticker-label">СОБЫТИЯ</div>
  <div id="ticker-items"></div>
</div>

<!-- Hypothesis Panel -->
<div id="hypothesis-panel">
  <div class="hp-header">
    <span style="font-size:12px;font-weight:600;color:#90caf9;letter-spacing:0.5px;">ГИПОТЕЗЫ</span>
    <span id="hp-count" style="font-size:10px;color:#546e7a;"></span>
  </div>
  <div id="hp-body"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
let graphData = { nodes: [], edges: [] };
let nodeMap = {};

async function fetchGraph() {
  try {
    const resp = await fetch('/api/gigascope/graph');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    graphData = await resp.json();
    graphData.nodes.forEach(n => { nodeMap[n.id] = n; });
    document.getElementById('total-count').textContent = graphData.nodes.length;
    return true;
  } catch(e) {
    console.error('Fetch error:', e);
    return false;
  }
}

const container = document.getElementById('graph-container');
let width = container.clientWidth, height = container.clientHeight;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0e1a);
scene.fog = new THREE.FogExp2(0x0a0e1a, 0.018);
const camera = new THREE.PerspectiveCamera(40, width/height, 0.1, 60);
camera.position.set(0, 7, 14);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(width, height);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

const ambient = new THREE.AmbientLight(0x223366, 0.5); scene.add(ambient);
const dl = new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(8, 16, 8); scene.add(dl);
const dl2 = new THREE.DirectionalLight(0x4488ff, 0.3); dl2.position.set(-8, -4, -8); scene.add(dl2);
new THREE.PointLight(0x4488ff, 0.5, 20).position.set(0, 0, 0);

const pCount = 1200;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(pCount * 3);
for (let i = 0; i < pCount * 3; i++) pPos[i] = (Math.random() - 0.5) * 40;
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x4488ff, size: 0.04, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending }));
scene.add(particles);

for (let r of [3, 5.5, 8]) {
  const rg = new THREE.RingGeometry(r - 0.02, r + 0.02, 64);
  const rm = new THREE.MeshBasicMaterial({ color: 0x1a2a4a, side: THREE.DoubleSide, transparent: true, opacity: 0.2, depthWrite: false });
  const ring = new THREE.Mesh(rg, rm);
  ring.rotation.x = -Math.PI / 2;
  scene.add(ring);
}

const nodeObjects = {};
const flowParticles = [];
const layerRadii = { gateway: 0.5, services: 3.5, infra: 6.5 };
let selectedNodeId = null;

function buildGraph() {
  const nodes = graphData.nodes;
  const edges = graphData.edges;

  // Layout
  const layerGroups = {};
  nodes.forEach(n => {
    if (!layerGroups[n.layer]) layerGroups[n.layer] = [];
    layerGroups[n.layer].push(n);
  });
  Object.entries(layerGroups).forEach(([layer, ln]) => {
    const r = layerRadii[layer] || 4;
    ln.forEach((n, i) => {
      n._x = Math.cos((i / ln.length) * Math.PI * 2 - Math.PI / 2) * r;
      n._z = Math.sin((i / ln.length) * Math.PI * 2 - Math.PI / 2) * r;
    });
  });

  // Nodes
  nodes.forEach(n => {
    const g = new THREE.Group();
    g.position.set(n._x, 0, n._z);
    const sz = n.layer === 'gateway' ? 0.65 : n.layer === 'infra' ? 0.85 : 0.75;
    const col = n.status === 'healthy' ? 0x22c55e : n.status === 'warning' ? 0xffd600 : 0xff1744;
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(sz, 32, 32),
      new THREE.MeshPhysicalMaterial({ color: col, emissive: col, emissiveIntensity: 0.15, metalness: 0.2, roughness: 0.3, clearcoat: 0.4 })
    );
    mesh.castShadow = true;
    g.add(mesh);

    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(sz * 1.3, 0.03, 8, 24),
      new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending })
    );
    ring.rotation.x = Math.PI / 2;
    g.add(ring);

    // Name label
    const c = document.createElement('canvas');
    c.width = 512; c.height = 72;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#e0e6f0';
    ctx.font = 'bold 30px "Segoe UI",sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 10;
    ctx.fillText(n.id, 256, 36);
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false, opacity: 0.9 }));
    spr.scale.set(2.5, 0.4, 1);
    spr.position.y = -sz - 0.6;
    g.add(spr);

    // Type label
    const c2 = document.createElement('canvas');
    c2.width = 512; c2.height = 56;
    const ctx2 = c2.getContext('2d');
    ctx2.fillStyle = '#78909c';
    ctx2.font = '18px "Segoe UI",sans-serif';
    ctx2.textAlign = 'center'; ctx2.textBaseline = 'middle';
    ctx2.shadowColor = 'rgba(0,0,0,0.8)'; ctx2.shadowBlur = 6;
    ctx2.fillText(n.type, 256, 28);
    const spr2 = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c2), transparent: true, depthWrite: false, opacity: 0.5 }));
    spr2.scale.set(2, 0.3, 1);
    spr2.position.y = -sz - 1.0;
    g.add(spr2);

    scene.add(g);
    nodeObjects[n.id] = { group: g, mesh, data: n };
  });

  // Edges
  edges.forEach(e => {
    const s = nodeObjects[e.source], t = nodeObjects[e.target];
    if (!s || !t) return;
    const sv = new THREE.Vector3(s.group.position.x, 0, s.group.position.z);
    const tv = new THREE.Vector3(t.group.position.x, 0, t.group.position.z);
    const mid = new THREE.Vector3().addVectors(sv, tv).multiplyScalar(0.5);
    mid.y += 0.25;
    const curve = new THREE.QuadraticBezierCurve3(sv, mid, tv);
    const isSync = e.type === 'sync';
    const col = isSync ? 0x4dd0e1 : 0xffd740;
    const opacity = isSync ? 0.3 : 0.2;

    const tube = new THREE.Mesh(
      new THREE.TubeGeometry(curve, 18, 0.025, 4, false),
      new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity, blending: THREE.AdditiveBlending })
    );
    scene.add(tube);

    // Flow particles
    const count = isSync ? 2 : 1;
    for (let i = 0; i < count; i++) {
      const pm = new THREE.Mesh(
        new THREE.SphereGeometry(isSync ? 0.04 : 0.03, 4, 4),
        new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending })
      );
      const tVal = Math.random();
      pm.position.copy(curve.getPoint(tVal));
      scene.add(pm);
      flowParticles.push({ mesh: pm, curve, t: tVal, speed: (0.002 + Math.random() * 0.003) * (isSync ? 1.5 : 1) });
    }
  });

  updateCounts();
  setupInteraction();
}

function updateCounts() {
  let n = 0, w = 0, c = 0;
  graphData.nodes.forEach(x => {
    if (x.status === 'healthy') n++;
    else if (x.status === 'warning') w++;
    else c++;
  });
  document.getElementById('normal-count').textContent = n;
  document.getElementById('warn-count').textContent = w;
  document.getElementById('crit-count').textContent = c;
}

function closePanel() {
  document.getElementById('sidebar').classList.remove('open');
  if (selectedNodeId !== null) {
    const obj = nodeObjects[selectedNodeId];
    if (obj) obj.mesh.material.emissiveIntensity = 0.15;
    selectedNodeId = null;
  }
}

function showNodeDetails(id) {
  selectedNodeId = id;
  const n = nodeObjects[id]?.data;
  if (!n) return;
  const m = n.metadata || {};
  Object.values(nodeObjects).forEach(obj => {
    obj.mesh.material.emissiveIntensity = obj.data.id === id ? 0.5 : 0.15;
  });
  document.getElementById('panel-title').textContent = n.id;
  document.getElementById('panel-subtitle').textContent = n.type + ' · ' + (n.layer === 'gateway' ? 'Шлюз' : n.layer === 'services' ? 'Банковский сервис' : 'Инфраструктура');

  let html = `<div style="margin-bottom:12px;"><span class="badge ${n.status === 'healthy' ? 'ok' : n.status === 'warning' ? 'warn' : 'crit'}" style="font-size:12px;">${n.status === 'healthy' ? 'Норма' : n.status === 'warning' ? 'Внимание' : 'Критично'}</span><span class="badge info" style="font-size:12px;margin-left:4px;">${n.layer === 'gateway' ? 'Шлюз' : n.layer === 'services' ? 'Банковский сервис' : 'Инфраструктура'}</span></div>`;
  html += '<h3 style="font-size:12px;color:#90caf9;margin:0 0 6px;letter-spacing:0.5px;">МЕТАДАННЫЕ</h3>';
  if (m.port) html += `<div class="metric-row"><span class="metric-label">Порт</span><span class="metric-value">${m.port}</span></div>`;
  if (m.version) html += `<div class="metric-row"><span class="metric-label">Версия</span><span class="metric-value">${m.version}</span></div>`;
  if (m.type) html += `<div class="metric-row"><span class="metric-label">СУБД</span><span class="metric-value">${m.type}</span></div>`;
  if (m.topics !== undefined) html += `<div class="metric-row"><span class="metric-label">Топики Kafka</span><span class="metric-value">${m.topics}</span></div>`;

  html += '<h3 style="font-size:12px;color:#90caf9;margin:12px 0 6px;letter-spacing:0.5px;">СВЯЗИ</h3>';
  const outgoing = graphData.edges.filter(e => e.source === id);
  const incoming = graphData.edges.filter(e => e.target === id);
  if (outgoing.length > 0) {
    html += '<div style="margin-bottom:6px;"><div style="font-size:10px;color:#4dd0e1;margin-bottom:4px;">→ Исходящие:</div>';
    outgoing.forEach(e => { const lbl = e.type === 'sync' ? 'ok' : 'warn'; html += `<div class="metric-row"><span class="metric-label" style="color:#b0bec5;">→ ${e.target}</span><span class="metric-value ${lbl}" style="font-size:10px;">${e.type === 'sync' ? 'REST/gRPC' : 'Kafka'}</span></div>`; });
    html += '</div>';
  }
  if (incoming.length > 0) {
    html += '<div><div style="font-size:10px;color:#4dd0e1;margin-bottom:4px;">← Входящие:</div>';
    incoming.forEach(e => { const lbl = e.type === 'sync' ? 'ok' : 'warn'; html += `<div class="metric-row"><span class="metric-label" style="color:#b0bec5;">← ${e.source}</span><span class="metric-value ${lbl}" style="font-size:10px;">${e.type === 'sync' ? 'REST/gRPC' : 'Kafka'}</span></div>`; });
    html += '</div>';
  }
  if (outgoing.length === 0 && incoming.length === 0) html += '<div style="color:#546e7a;font-size:11px;">Нет связей</div>';

  html += `<h3 style="font-size:12px;color:#90caf9;margin:12px 0 6px;letter-spacing:0.5px;">ИНЦИДЕНТЫ</h3>`;
  html += `<div class="metric-row"><span class="metric-label">Открытых инцидентов</span><span class="metric-value ${n.open_incidents > 0 ? 'crit' : 'ok'}">${n.open_incidents}</span></div>`;
  html += n.open_incidents > 0 ? '<div style="color:#546e7a;font-size:10px;margin-top:4px;">Запустите демо-сценарий для симуляции</div>' : '<div style="color:#546e7a;font-size:10px;margin-top:4px;">Все системы в норме</div>';

  document.getElementById('panel-body').innerHTML = html;
  document.getElementById('sidebar').classList.add('open');
}

function setupInteraction() {
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const tooltip = document.getElementById('tooltip');

  renderer.domElement.addEventListener('mousemove', e => {
    const r = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const meshes = Object.values(nodeObjects).map(o => o.mesh);
    const hits = raycaster.intersectObjects(meshes);
    renderer.domElement.style.cursor = hits.length > 0 ? 'pointer' : 'default';

    if (hits.length > 0) {
      const hit = hits[0].object;
      for (const [id, obj] of Object.entries(nodeObjects)) {
        if (obj.mesh === hit) {
          const n = obj.data, m = n.metadata || {};
          tooltip.innerHTML = `<div class="tt-name">${n.id}</div>
            <div class="tt-row"><span class="tt-label">Тип</span><span class="tt-val">${n.type}</span></div>
            <div class="tt-row"><span class="tt-label">Статус</span><span class="tt-val ${n.status === 'healthy' ? 'ok' : n.status === 'warning' ? 'warn' : 'crit'}">${n.status === 'healthy' ? 'Норма' : n.status === 'warning' ? 'Внимание' : 'Критично'}</span></div>
            <div class="tt-divider"></div>
            ${m.port ? `<div class="tt-row"><span class="tt-label">Порт</span><span class="tt-val">${m.port}</span></div>` : ''}
            ${m.version ? `<div class="tt-row"><span class="tt-label">Версия</span><span class="tt-val">${m.version}</span></div>` : ''}
            ${m.type ? `<div class="tt-row"><span class="tt-label">СУБД</span><span class="tt-val">${m.type}</span></div>` : ''}
            ${m.topics !== undefined ? `<div class="tt-row"><span class="tt-label">Топики</span><span class="tt-val">${m.topics}</span></div>` : ''}
            ${n.open_incidents > 0 ? `<div class="tt-divider"></div><div class="tt-row"><span class="tt-label">Инциденты</span><span class="tt-val crit">${n.open_incidents}</span></div>` : ''}`;
          tooltip.style.display = 'block';
          tooltip.style.left = (e.clientX + 14) + 'px';
          tooltip.style.top = (e.clientY - 10) + 'px';
          const tr = tooltip.getBoundingClientRect();
          if (tr.right > window.innerWidth) tooltip.style.left = (e.clientX - tr.width - 14) + 'px';
          if (tr.bottom > window.innerHeight) tooltip.style.top = (e.clientY - tr.height - 10) + 'px';
          break;
        }
      }
    } else {
      tooltip.style.display = 'none';
    }
  });

  renderer.domElement.addEventListener('click', e => {
    const r = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(Object.values(nodeObjects).map(o => o.mesh));
    if (hits.length > 0) {
      for (const [id, obj] of Object.entries(nodeObjects)) {
        if (obj.mesh === hits[0].object) { showNodeDetails(id); return; }
      }
    } else {
      if (document.getElementById('sidebar').classList.contains('open')) closePanel();
      else if (selectedNodeId !== null) {
        const obj = nodeObjects[selectedNodeId];
        if (obj) obj.mesh.material.emissiveIntensity = 0.15;
        selectedNodeId = null;
      }
    }
  });

  // Orbit controls
  let isDragging = false, prevMouse = { x: 0, y: 0 };
  let theta = 0, phi = 0.5, radius = 14, targetTheta = theta, targetPhi = phi, targetRadius = radius;

  renderer.domElement.addEventListener('mousedown', e => {
    if (e.button === 0) {
      const r = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
      mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      if (raycaster.intersectObjects(Object.values(nodeObjects).map(o => o.mesh)).length === 0) {
        isDragging = true; prevMouse.x = e.clientX; prevMouse.y = e.clientY;
      }
    }
  });
  window.addEventListener('mousemove', e => {
    if (isDragging) {
      targetTheta -= (e.clientX - prevMouse.x) * 0.005;
      targetPhi = Math.max(0.1, Math.min(Math.PI - 0.1, targetPhi + (e.clientY - prevMouse.y) * 0.005));
      prevMouse.x = e.clientX; prevMouse.y = e.clientY;
    }
  });
  window.addEventListener('mouseup', () => { isDragging = false; });
  renderer.domElement.addEventListener('wheel', e => { e.preventDefault(); targetRadius = Math.max(6, Math.min(30, targetRadius + e.deltaY * 0.02)); }, { passive: false });

  // Touch
  let touchStartDist = 0;
  renderer.domElement.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      const r = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.touches[0].clientX - r.left) / r.width) * 2 - 1;
      mouse.y = -((e.touches[0].clientY - r.top) / r.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(Object.values(nodeObjects).map(o => o.mesh));
      if (hits.length === 0) { isDragging = true; prevMouse.x = e.touches[0].clientX; prevMouse.y = e.touches[0].clientY; }
      else { for (const [id, obj] of Object.entries(nodeObjects)) { if (obj.mesh === hits[0].object) { showNodeDetails(id); return; } } }
    }
    if (e.touches.length === 2) { const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY; touchStartDist = Math.sqrt(dx*dx + dy*dy); }
  }, { passive: true });
  renderer.domElement.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && isDragging) {
      targetTheta -= (e.touches[0].clientX - prevMouse.x) * 0.005;
      targetPhi = Math.max(0.1, Math.min(Math.PI - 0.1, targetPhi + (e.touches[0].clientY - prevMouse.y) * 0.005));
      prevMouse.x = e.touches[0].clientX; prevMouse.y = e.touches[0].clientY;
    }
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      targetRadius = Math.max(6, Math.min(30, targetRadius + (touchStartDist - dist) * 0.05));
      touchStartDist = dist;
    }
  }, { passive: true });
  renderer.domElement.addEventListener('touchend', () => { isDragging = false; }, { passive: true });

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);

    // Auto-orbit
    if (orbitActive) targetTheta += ORBIT_SPEED;

    theta += (targetTheta - theta) * 0.08;
    phi += (targetPhi - phi) * 0.08;
    radius += (targetRadius - radius) * 0.08;
    camera.position.x = radius * Math.sin(phi) * Math.cos(theta);
    camera.position.y = radius * Math.cos(phi);
    camera.position.z = radius * Math.sin(phi) * Math.sin(theta);
    camera.lookAt(0, 0, 0);

    // Node breathing (emissive pulsing)
    breatheNodes();

    flowParticles.forEach(fp => {
      fp.t += fp.speed;
      if (fp.t > 1) fp.t -= 1;
      fp.mesh.position.copy(fp.curve.getPoint(fp.t));
    });
    particles.rotation.y += 0.0003;
    renderer.render(scene, camera);
  }
  animate();
}

window.addEventListener('resize', () => {
  width = container.clientWidth;
  height = container.clientHeight;
  camera.aspect = width / height;
  camera.updateProjectionMatrix();
  renderer.setSize(width, height);
});

// === ENHANCEMENTS: Auto-orbit, pulsing, polling, ticker, hypotheses ===
let orbitIdleTimer = null;
let orbitActive = true;
const ORBIT_IDLE_DELAY = 10000;
const ORBIT_SPEED = 0.002;

function resetOrbitTimer() {
  orbitActive = false;
  clearTimeout(orbitIdleTimer);
  orbitIdleTimer = setTimeout(() => { orbitActive = true; }, ORBIT_IDLE_DELAY);
}

// Global mouse/keyboard listeners reset orbit timer
window.addEventListener('mousedown', resetOrbitTimer, true);
window.addEventListener('touchstart', resetOrbitTimer, true);
window.addEventListener('wheel', resetOrbitTimer, true);
resetOrbitTimer();

let breathePhase = 0;
let lastEventTs = null;

// Node breathing — runs inside animate()
function breatheNodes() {
  breathePhase += 0.02;
  Object.values(nodeObjects).forEach(obj => {
    const s = obj.data.status;
    if (s === 'healthy') {
      const pulse = 0.12 + Math.sin(breathePhase) * 0.06;
      obj.mesh.material.emissiveIntensity = pulse;
    } else if (s === 'warning' || s === 'critical' || s === 'down') {
      const pulse = 0.4 + Math.sin(breathePhase * 2.5) * 0.3;
      obj.mesh.material.emissiveIntensity = pulse;
    }
  });
}

// Real-time polling
async function pollStatus() {
  try {
    const resp = await fetch('/api/gigascope/graph');
    if (!resp.ok) return;
    const data = await resp.json();
    // Update node statuses
    data.nodes.forEach(n => {
      if (nodeMap[n.id]) {
        const prevStatus = nodeMap[n.id].status;
        if (prevStatus !== n.status) {
          addTickerEvent(n.status, `${n.id}: ${prevStatus} → ${n.status}`);
          const obj = nodeObjects[n.id];
          if (obj) {
            const col = n.status === 'healthy' ? 0x22c55e : n.status === 'warning' ? 0xffd600 : 0xff1744;
            obj.mesh.material.color.setHex(col);
            obj.mesh.material.emissive.setHex(col);
          }
        }
        nodeMap[n.id] = n;
      }
    });
    // Update counts
    let nc = 0, wc = 0, cc = 0;
    data.nodes.forEach(x => {
      if (x.status === 'healthy') nc++; else if (x.status === 'warning') wc++; else cc++;
    });
    document.getElementById('normal-count').textContent = nc;
    document.getElementById('warn-count').textContent = wc;
    document.getElementById('crit-count').textContent = cc;
    document.getElementById('total-count').textContent = data.nodes.length;
    // Refresh sidebar if open
    if (selectedNodeId && nodeMap[selectedNodeId]) showNodeDetails(selectedNodeId);
    await pollHypotheses();
    await pollEvents();
  } catch(e) {}
}

async function pollHypotheses() {
  try {
    const resp = await fetch('/api/gigascope/hypotheses');
    if (!resp.ok) return;
    const data = await resp.json();
    const hyps = data.hypotheses || [];
    document.getElementById('hp-count').textContent = `(${hyps.length})`;
    const body = document.getElementById('hp-body');
    if (hyps.length === 0) {
      body.innerHTML = '<div style="padding:12px;text-align:center;color:#546e7a;font-size:10px;">Гипотезы появятся после анализа инцидентов</div>';
      return;
    }
    let html = '';
    hyps.forEach(h => {
      const conf = Math.round((h.confidence || 0) * 100);
      const confClass = conf >= 60 ? 'hp-conf-high' : conf >= 30 ? 'hp-conf-mid' : 'hp-conf-low';
      const statusClass = h.status === 'confirmed' ? 'confirmed' : h.status === 'rejected' ? 'rejected' : 'pending';
      const statusLabel = h.status === 'confirmed' ? '✓' : h.status === 'rejected' ? '✗' : '○';
      html += `<div class="hp-card" onclick="showHypothesisDetail('${h.id}')">
        <div class="hp-title">${h.text || h.id}</div>
        <div class="hp-row"><span class="hp-label">Уверенность</span><span class="hp-confidence ${confClass}">${conf}%</span></div>
        <div class="hp-row"><span class="hp-label">Статус</span><span class="hp-status ${statusClass}">${statusLabel}</span></div>
      </div>`;
    });
    body.innerHTML = html;
  } catch(e) {}
}

async function pollEvents() {
  try {
    const resp = await fetch('/api/gigascope/events');
    if (!resp.ok) return;
    const data = await resp.json();
    const events = data.events || [];
    if (events.length > 0) {
      const latest = events[0];
      const ts = latest.timestamp || latest.id;
      if (ts !== lastEventTs) {
        lastEventTs = ts;
        addTickerEvent(latest.severity || 'info', latest.description || (latest.service + ' ' + latest.type) || 'Event');
      }
    }
  } catch(e) {}
}

let tickerItems = [];

function addTickerEvent(severity, text) {
  const container = document.getElementById('ticker-items');
  const dotClass = severity === 'critical' || severity === 'down' ? 'critical' : severity === 'warning' ? 'warning' : severity === 'info' ? 'info' : 'ok';
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const el = document.createElement('div');
  el.className = 'ticker-item';
  el.innerHTML = `<span class="ticker-dot ${dotClass}"></span><span>${text}</span><span class="ticker-time">${timeStr}</span>`;
  container.appendChild(el);
  tickerItems.push(el);
  while (tickerItems.length > 8) {
    const old = tickerItems.shift();
    if (old && old.parentNode) old.parentNode.removeChild(old);
  }
  container.scrollLeft = container.scrollWidth;
}

// === Hypothesis Detail Modal ===
const modalOverlay = document.createElement('div');
modalOverlay.id = 'modal-overlay';
modalOverlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center';
modalOverlay.onclick = (e) => { if (e.target === modalOverlay) closeModal(); };
const modalBox = document.createElement('div');
modalBox.id = 'modal-box';
modalBox.style.cssText = 'background:rgba(12,18,34,0.97);border:1px solid rgba(0,180,255,0.2);border-radius:14px;width:480px;max-width:90vw;max-height:80vh;overflow-y:auto;padding:24px;backdrop-filter:blur(12px);position:relative';
modalBox.innerHTML = '<div id="modal-close" style="position:absolute;top:12px;right:16px;color:#78909c;font-size:22px;cursor:pointer;line-height:1" onclick="closeModal()">✕</div><div id="modal-content"></div>';
modalOverlay.appendChild(modalBox);
document.body.appendChild(modalOverlay);

function closeModal() { modalOverlay.style.display = 'none'; }

async function showHypothesisDetail(id) {
  try {
    const resp = await fetch('/api/gigascope/hypotheses/' + id);
    if (!resp.ok) return;
    const d = await resp.json();
    const confPct = Math.round((d.confidence || 0) * 100);
    const confClass = confPct >= 60 ? 'hp-conf-high' : confPct >= 30 ? 'hp-conf-mid' : 'hp-conf-low';
    const statusLabels = { confirmed: '✅ Подтверждена', pending: '🔬 На проверке', rejected: '❌ Отклонена' };
    const evHtml = (d.evidence || []).map(e =>
      `<div style="padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:11px">
        <div style="color:#b0bec5">${e.text || '—'}</div>
        <div style="display:flex;gap:8px;margin-top:2px;font-size:9px;color:#546e7a">
          <span>Вес: ${e.weight || 0}</span>
          <span>Источник: ${e.source_type || '—'}</span>
        </div>
      </div>`
    ).join('') || '<div style="color:#546e7a;font-size:10px;padding:6px">Нет подтверждений</div>';
    const incidentsHtml = (d.related_incidents || []).map(i =>
      `<div style="display:flex;gap:8px;padding:4px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,0.03)">
        <span style="color:${i.severity === 'critical' ? '#ff1744' : i.severity === 'warning' ? '#ffd600' : '#00e676'}">●</span>
        <span>${i.incident_id || '—'}</span>
        <span style="color:#78909c">${i.service || '?'}</span>
        <span style="color:#546e7a">${i.status || '?'}</span>
      </div>`
    ).join('') || '<div style="color:#546e7a;font-size:10px;padding:4px">Нет связанных инцидентов</div>';
    document.getElementById('modal-content').innerHTML = `
      <div style="margin-bottom:16px">
        <div style="font-size:15px;font-weight:700;color:#e0e6f0;margin-bottom:8px">${d.text || 'Без названия'}</div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px">
          <span>Уверенность: <span class="${confClass}" style="font-weight:700;font-size:13px">${confPct}%</span></span>
          <span>Статус: ${statusLabels[d.status] || '🔬 На проверке'}</span>
          <span style="color:#546e7a">Создана: ${d.created_by || '?'}</span>
        </div>
        <div style="font-size:10px;color:#546e7a;margin-top:4px">ID: ${d.id}</div>
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:10px;font-weight:600;color:#78909c;letter-spacing:0.5px;margin-bottom:4px;text-transform:uppercase">Подтверждения</div>
        ${evHtml}
      </div>
      <div>
        <div style="font-size:10px;font-weight:600;color:#78909c;letter-spacing:0.5px;margin-bottom:4px;text-transform:uppercase">Связанные инциденты</div>
        ${incidentsHtml}
      </div>
    `;
    modalOverlay.style.display = 'flex';
  } catch(e) {}
}

// Start polling
setInterval(pollStatus, 15000);

  document.getElementById('total-count').textContent = '...';
  const ok = await fetchGraph();
  if (ok && graphData.nodes.length > 0) {

    setTimeout(() => { pollStatus(); }, 2000);

    container.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:16px;color:#78909c;"><div style="font-size:48px;">📡</div><div style="font-size:16px;">Не удалось загрузить данные графа</div><div style="font-size:12px;">Проверьте, работает ли Ouroboros на порту 8765</div><button onclick="location.reload()" style="margin-top:8px;padding:8px 20px;border-radius:8px;border:1px solid rgba(0,180,255,0.3);background:rgba(0,180,255,0.1);color:#81d4fa;cursor:pointer;font-size:13px;font-family:inherit;">Повторить</button></div>`;
  }
})();
